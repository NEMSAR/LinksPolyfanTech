    <title>Letras Corpóreas en Polyfan</title>

    <style>
        /* Reseteamos márgenes y evitamos el scroll de la página contenedora */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: #050505; /* Mismo color de fondo de tu App Script para una transición invisible */
        }
        
        /* El iframe ocupa el 100% del espacio sin bordes */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
