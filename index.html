<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polyfan Tech - Letras Corpóreas</title>
    
    <meta http-equiv="refresh" content="0; url=https://script.google.com/macros/s/AKfycby4RMYNu0y0fvNTIbcSpXq7O-Vq_GX5pm5jhuVy_INIrVX0o-ezvHBdgVAePTrWRkkl/exec">
    
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #050505; /* Fondo oscuro mientras carga */
            color: #FF6A00; /* Naranja de tu marca */
            font-family: 'Montserrat', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; text-transform: uppercase; font-weight: 900; letter-spacing: 2px;
        }
        .loader {
            display: flex; flex-direction: column; align-items: center;
        }
        .spinner {
            width: 40px; height: 40px; border: 3px solid rgba(255,106,0,0.2); 
            border-top-color: #FF6A00; border-radius: 50%; 
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="loader">
        <div class="spinner"></div>
        <div>Iniciando...</div>
    </div>

    <script>
        // REEMPLAZAR: Pega tu URL de Apps Script aquí también

    </script>

</body>
</html>
